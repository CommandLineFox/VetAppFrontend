name: Full Stack Safety

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Backend
        uses: actions/checkout@v4
        with:
          repository: CommandLineFox/VetAppBackend
          path: backend

      - name: Install SOPS
        run: |
          curl -Lo sops https://github.com/getsops/sops/releases/download/v3.8.1/sops-v3.8.1.linux.amd64
          chmod +x sops
          sudo mv sops /usr/local/bin

      - name: Decrypt Secrets
        run: |
          cd backend
          sops --decrypt --output-type dotenv secrets.enc.yaml > .env
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven Tests
        run: |
          cd backend
          export $(grep -v '^#' .env | xargs)
          mvn clean test

  cypress-e2e-tests:
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - name: Checkout Frontend
        uses: actions/checkout@v4
        with:
          repository: CommandLineFox/VetAppFrontend
          path: frontend

      - name: Checkout Backend
        uses: actions/checkout@v4
        with:
          repository: CommandLineFox/VetAppBackend
          path: backend

      - name: Install SOPS
        run: |
          curl -Lo sops https://github.com/getsops/sops/releases/download/v3.8.1/sops-v3.8.1.linux.amd64
          chmod +x sops
          sudo mv sops /usr/local/bin

      - name: Decrypt Backend Secrets
        run: |
          cd backend
          sops --decrypt --output-type dotenv secrets.enc.yaml > .env
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

      - name: Decrypt Frontend Secrets
        run: |
          cd frontend
          sops --decrypt --output-type dotenv secrets.enc.yaml > .env
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

      - name: Set up Docker Builds
        uses: docker/setup-buildx-action@v3

      - name: Build and Start Stack
        run: |
          cd backend
          docker compose up --build -d
          
          cd ../frontend
          docker compose up --build -d

      - name: Wait for Health
        run: |
          timeout 120s bash -c 'until curl -f http://localhost:8080/api/health; do echo "Wait BE..."; sleep 5; done'
          timeout 60s bash -c 'until curl -f http://localhost:3000; do echo "Wait FE..."; sleep 5; done'

      - name: Run Cypress
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          browser: chrome
          install: true
        env:
          CYPRESS_BASE_URL: http://localhost:3000